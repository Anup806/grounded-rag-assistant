version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: backend_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: backend_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_storage:/data
    restart: unless-stopped

volumes:
  qdrant_storage:
  redis_storage:
